---
kind: pipeline
name: Build Library
type: kubernetes

platform:
  os: linux
  arch: amd64

environment:
  GIT_REPO: UKHomeOffice/hof-genesys-chat-component

include_default_branch: &include_default_branch
  include:
    - main

include_all_branches: &include_all_branches
  include:
    - main
    - feature/*
    - fix/*

trigger:
  branch:
    <<: *include_all_branches

node_image: &node_image
  pull: if-not-exists
  image: quay.io/ukhomeofficedigital/hof-nodejs:20.19.0-alpine3.21-v2@sha256:ab9686c7cf77bab94ab32c1c0e262b2a5242c2cbff61b0bbb3f62610b4f2e706

lint: &lint
  pull: if-not-exists
  image: node:20.19.0
  commands:
    - yarn lint

unit_tests: &unit_tests
  pull: if-not-exists
  image: node:20.19.0
  commands:
    - yarn run test

# sonar_scanner: &sonar_scanner
#   pull: if-not-exists
#   image: quay.io/ukhomeofficedigital/sonar-scanner-nodejs:latest
#   commands:
#     - sonar-scanner -Dproject.settings=./sonar-project.properties

steps:
  - name: lint
    <<: *node_image
    commands:
      - yarn install --frozen-lockfile
      - yarn lint
    when:
      branch:
        <<: *include_all_branches
      event: [push, pull_request]
  - name: unit_tests
    <<: *node_image
    commands:
      - yarn install --frozen-lockfile
      - yarn test
    when:
      branch:
        <<: *include_all_branches
      event: [push, pull_request]
    depends_on:
      - lint
  # - name: sonar_scanner
  #   <<: *sonar_scanner
  #   when:
  #     branch:
  #       <<: *include_all_branches
  #     event: [push, pull_request]

services:
  - name: docker
    image: 340268328991.dkr.ecr.eu-west-2.amazonaws.com/acp/dind

volumes:
  - name: dockersock
    temp: {}
