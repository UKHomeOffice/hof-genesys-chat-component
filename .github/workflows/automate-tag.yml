# This workflow will lint and run tests using node and then create a git tag depending on the commit message. The tag will then trigger the Automate_Publish workflow to publish a package to GitHub Packages when a release is created
# For more information see: https://help.github.com/actions/language-and-framework-guides/publishing-nodejs-packages
name: Automate_Tag
on: [push]
env:
  NODE_VERSION: 24
jobs:
  test:    
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: borales/actions-yarn@v4
        with:
          cmd: install --frozen-lockfile
      - run: yarn lint
      - run: yarn test    

  auto-tag-patch:
    needs: test
    runs-on: ubuntu-22.04
    if: |
      startsWith(github.ref, 'refs/heads/main') &&
      !contains(github.event.head_commit.message, '[MAJOR]') &&
      !contains(github.event.head_commit.message, '[MINOR]')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/
      - run: |
          git config --local user.email "$(git log --format='%ae' HEAD^!)"
          git config --local user.name "$(git log --format='%an' HEAD^!)"
          npm version patch

  auto-tag-minor:
    needs: test
    runs-on: ubuntu-22.04
    if: |
      startsWith(github.ref, 'refs/heads/main') &&
      !contains(github.event.head_commit.message, '[MAJOR]') &&
      contains(github.event.head_commit.message, '[MINOR]')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/
      - run: |
          git config --local user.email "$(git log --format='%ae' HEAD^!)"
          git config --local user.name "$(git log --format='%an' HEAD^!)"
          npm version minor

  auto-tag-major:
    needs: test
    runs-on: ubuntu-22.04
    if: |
      startsWith(github.ref, 'refs/heads/main') &&
      contains(github.event.head_commit.message, '[MAJOR]') &&
      !contains(github.event.head_commit.message, '[MINOR]')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/
      - run: |
          git config --local user.email "$(git log --format='%ae' HEAD^!)"
          git config --local user.name "$(git log --format='%an' HEAD^!)"
          npm version major
